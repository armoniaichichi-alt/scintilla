<title>SCINTILLA | 沖縄、その夜だけの宴</title>

<style>
  :root {
    --midnight: #0D0D0D;
    --deep-ocean: #1A2B3C;
    --dusk-navy: #1A4A6B;
    --ember: #C85A1A;
    --amber: #D4A340;
    --gold: #F0C060;
    --stone: #888888;
    --ivory: #F5F0E8;
    --white: #FFFFFF;

    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-jp: 'Noto Serif JP', serif;
    --font-body: 'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--midnight);
    color: var(--ivory);
    font-family: var(--font-body);
    font-weight: 300;
    overflow-x: hidden;
    cursor: none;
  }

  /* ── Custom cursor ── */
  .cursor {
    position: fixed;
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease;
    mix-blend-mode: screen;
  }
  .cursor-ring {
    position: fixed;
    width: 32px; height: 32px;
    border: 1px solid rgba(240,192,96,0.4);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: transform 0.12s ease, width 0.3s ease, height 0.3s ease;
  }

  /* ── Navigation ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 52px;
    mix-blend-mode: normal;
    transition: background 0.5s ease, padding 0.4s ease;
  }
  nav.scrolled {
    background: rgba(13,13,13,0.92);
    backdrop-filter: blur(12px);
    padding: 18px 52px;
    border-bottom: 1px solid rgba(240,192,96,0.08);
  }
  .nav-logo {
    font-family: var(--font-display);
    font-size: 1.2rem;
    letter-spacing: 0.35em;
    color: var(--gold);
    text-decoration: none;
    font-weight: 300;
  }
  .nav-links {
    display: flex;
    gap: 42px;
    list-style: none;
  }
  .nav-links a {
    font-family: var(--font-body);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--stone);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.3s ease;
  }
  .nav-links a:hover { color: var(--gold); }

  /* ── HERO ── */
  #hero {
    position: relative;
    height: 100vh;
    min-height: 680px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: radial-gradient(ellipse 80% 60% at 50% 70%, #1a0c05 0%, var(--midnight) 70%);
  }

  #sparkCanvas {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  .hero-sub {
    font-family: var(--font-body);
    font-size: 0.65rem;
    letter-spacing: 0.4em;
    color: var(--ember);
    text-transform: uppercase;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 1s 0.4s forwards;
  }

  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(4rem, 11vw, 10rem);
    font-weight: 300;
    letter-spacing: 0.18em;
    color: var(--white);
    line-height: 1;
    position: relative;
    opacity: 0;
    animation: fadeUp 1.2s 0.7s forwards;
  }
  .hero-title .gold-dot {
    color: var(--gold);
  }

  .hero-tagline {
    margin-top: 36px;
    font-family: var(--font-jp);
    font-size: clamp(0.85rem, 2vw, 1rem);
    font-weight: 300;
    color: rgba(245,240,232,0.65);
    letter-spacing: 0.12em;
    opacity: 0;
    animation: fadeUp 1.2s 1.1s forwards;
    text-align: center;
    line-height: 2;
  }
  .hero-tagline em {
    display: block;
    font-style: italic;
    font-family: var(--font-display);
    font-size: 0.85em;
    color: var(--stone);
    letter-spacing: 0.06em;
    margin-top: 6px;
  }

  .hero-line {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 1px;
    height: 72px;
    background: linear-gradient(to bottom, transparent, var(--gold));
    opacity: 0;
    animation: fadeIn 1.5s 1.8s forwards;
  }

  .hero-scroll-hint {
    position: absolute;
    bottom: 90px;
    font-family: var(--font-body);
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: var(--stone);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeIn 1.5s 2s forwards;
  }

  /* ── Reveal animation base ── */
  .reveal {
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.9s cubic-bezier(0.22,1,0.36,1), transform 0.9s cubic-bezier(0.22,1,0.36,1);
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .reveal-delay-1 { transition-delay: 0.15s; }
  .reveal-delay-2 { transition-delay: 0.3s; }
  .reveal-delay-3 { transition-delay: 0.45s; }

  /* ── Section base ── */
  section {
    padding: 120px 52px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .section-label {
    font-family: var(--font-body);
    font-size: 0.6rem;
    letter-spacing: 0.4em;
    color: var(--ember);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .section-title-en {
    font-family: var(--font-display);
    font-size: clamp(2.8rem, 5vw, 4.5rem);
    font-weight: 300;
    line-height: 1.1;
    color: var(--white);
    letter-spacing: 0.04em;
  }

  .section-title-jp {
    font-family: var(--font-jp);
    font-size: 1rem;
    font-weight: 300;
    color: var(--stone);
    margin-top: 10px;
    letter-spacing: 0.1em;
  }

  .gold-rule {
    width: 48px;
    height: 1px;
    background: var(--gold);
    margin: 32px 0;
  }

  /* ── CONCEPT ── */
  #concept {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 100px;
    align-items: center;
    padding: 140px 52px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .concept-text p {
    font-family: var(--font-body);
    font-size: 0.95rem;
    line-height: 2.2;
    color: rgba(245,240,232,0.7);
    margin-bottom: 20px;
  }

  .concept-quote {
    font-family: var(--font-display);
    font-size: clamp(1.4rem, 2.5vw, 2rem);
    font-style: italic;
    color: var(--ivory);
    line-height: 1.7;
    padding-left: 28px;
    border-left: 1px solid var(--gold);
    margin: 48px 0;
  }

  .concept-keywords {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
  }

  .keyword-item {
    padding: 24px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(240,192,96,0.08);
    transition: background 0.3s ease, border-color 0.3s ease;
  }
  .keyword-item:hover {
    background: rgba(200,90,26,0.06);
    border-color: rgba(240,192,96,0.2);
  }
  .keyword-item .kw-en {
    font-family: var(--font-display);
    font-size: 1.3rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--gold);
    display: block;
    margin-bottom: 6px;
  }
  .keyword-item .kw-jp {
    font-family: var(--font-jp);
    font-size: 0.75rem;
    color: var(--stone);
    display: block;
  }

  /* ── PLANS ── */
  #plans {
    padding: 120px 52px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .plans-header {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: end;
    margin-bottom: 80px;
  }

  .plans-intro {
    font-family: var(--font-body);
    font-size: 0.9rem;
    line-height: 2;
    color: rgba(245,240,232,0.6);
  }

  .plan-tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 48px;
    border-bottom: 1px solid rgba(240,192,96,0.12);
  }

  .plan-tab {
    padding: 14px 32px;
    font-family: var(--font-body);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--stone);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.3s ease, border-color 0.3s ease;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    margin-bottom: -1px;
  }
  .plan-tab.active, .plan-tab:hover {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  .plan-content { display: none; }
  .plan-content.active { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2px; }

  .plan-card {
    padding: 48px 40px;
    background: rgba(255,255,255,0.015);
    border: 1px solid rgba(240,192,96,0.06);
    position: relative;
    overflow: hidden;
    transition: background 0.4s ease;
  }
  .plan-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--amber), transparent);
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .plan-card:hover::before { opacity: 1; }

  .plan-card.featured {
    background: rgba(200,90,26,0.06);
    border-color: rgba(212,163,64,0.2);
  }
  .plan-card.featured::before { opacity: 1; }

  .plan-name {
    font-family: var(--font-display);
    font-size: 1.6rem;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: var(--white);
    margin-bottom: 8px;
  }
  .plan-sub {
    font-family: var(--font-body);
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--ember);
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  .plan-desc {
    font-family: var(--font-body);
    font-size: 0.88rem;
    line-height: 2;
    color: rgba(245,240,232,0.6);
    margin-bottom: 36px;

    font-size: 2.2rem;
    font-weight: 300;
    color: var(--gold);
    letter-spacing: 0.04em;
  }
